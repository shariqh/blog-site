name: Vale (prose linter)

on:
  push:
    branches: [main]
    paths:
      - "src/content/writing/**/*.mdx"
      - "vale-styles/**"
      - ".vale.ini"
      - ".github/workflows/vale.yml"
  pull_request:
    paths:
      - "src/content/writing/**/*.mdx"
      - "vale-styles/**"
      - ".vale.ini"
      - ".github/workflows/vale.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  vale:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vale
        uses: errata-ai/vale-action@reviewdog
        with:
          # Use reviewdog to comment inline on PRs; non-error severities don't
          # block the PR but show up as suggestions.
          reporter: github-pr-review
          fail_on_error: true
          # Scope: just the posts. Style guide + READMEs are excluded via .vale.ini.
          files: src/content/writing
          version: 3.14.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
