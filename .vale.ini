# Vale prose linter config for shariq.dev.
# Rules live under vale-styles/ and codify the patterns documented in
# docs/EDITORIAL.md. Vale catches pattern-based issues (forbidden phrases,
# em-dash count); semantic issues (voice, accuracy, aspirational
# present-tense) stay in human review.
#
# Run locally:  vale src/content/writing
# CI:           .github/workflows/vale.yml runs on every PR

StylesPath = vale-styles
MinAlertLevel = suggestion

# Default rule set for any Markdown or MDX file we scan.
# MDX inline components (<Callout>, <Youtube>, etc.) are passed through
# untouched by Vale's markdown parser.
[*.{md,mdx}]
BasedOnStyles = shariq

# Don't lint these — internal/meta docs, not subject to the editorial guide.
[docs/EDITORIAL.md]
BasedOnStyles =

[README.md]
BasedOnStyles =

[CLAUDE.md]
BasedOnStyles =

[docs/superpowers/**/*.md]
BasedOnStyles =
